<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainUP - Profil</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <div class="appBg">
    <div class="shell">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand__logo">🧠</div>
          <div class="brand__name">Brain<span>UP</span></div>
        </div>

        <nav class="nav">
          <a class="nav__item" href="./accueil.html">🏠 <span>Accueil</span></a>
          <a class="nav__item" href="./cours.html">📚 <span>Cours</span></a>
          <a class="nav__item" href="./tableau_de_bord.html">📊 <span>Tableau de Bord</span></a>
          <a class="nav__item" href="./recommandations.html">⭐ <span>Recommandations</span></a>
          <a class="nav__item" href="./quiz.html">✅ <span>Quiz</span></a>
          <a class="nav__item" href="./chatbot.html">💬 <span>Chatbot</span></a>
          <a class="nav__item is-active" href="./profil.html">👤 <span>Profil</span></a>

          <div class="nav__divider"></div>

          <a class="nav__item" href="./deconnexion.html">⏻ <span>Déconnexion</span></a>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- TOPBAR -->
        <header class="topbar">
          <div class="search">
            <span class="search__icon">🔎</span>
            <input class="search__input" placeholder="Rechercher un message" />
          </div>

          <div class="topbar__right">
            <button class="iconBtn" title="Notifications">🔔</button>
            <button class="iconBtn" title="Messages">💬</button>
            <button class="iconBtn" title="Favoris">🔖</button>
          </div>
        </header>

        <!-- CONTENT -->
        <section class="content">

          <div class="card card--profile">
            <!-- Header profil -->
            <div class="profileHeader">
              <div class="profileHeader__left">
                <div class="avatar">
                  <!-- si tu as une image : -->
                  <!-- <img src="../assets/img/avatar.png" alt="Avatar"> -->
                </div>

                <div class="profileHeader__meta">
                  <div class="profileHeader__name">Fran Dupont</div>
                  <div class="profileHeader__sub">
                    <span class="badgeLine">👥 &nbsp;Élève / Vie scolaire</span>
                  </div>
                </div>
              </div>

              <div class="profileHeader__right">
                <button class="btn btn--primary">Modifier mon profil</button>
              </div>
            </div>

            <!-- Form -->
            <div class="formGrid">
              <div class="field">
                <label class="label">Nom</label>
                <div class="control">
                  <input class="input" type="text" value="Fran Dupont" />
                  <span class="fieldIcon">✎</span>
                </div>
              </div>

              <div class="field">
                <label class="label">Email</label>
                <div class="control">
                  <input class="input" type="email" value="fran.dupont@email.com" />
                  <span class="fieldIcon">✉️</span>
                </div>
              </div>

              <div class="field">
                <label class="label">Mot de passe</label>
                <div class="control">
                  <input class="input" type="password" value="password" />
                  <span class="fieldIcon">🔒</span>
                </div>
              </div>

              <div class="field">
                <label class="label">Rôle</label>
                <div class="control">
                  <select class="input">
                    <option selected>Étudiant</option>
                    <option>Enseignant</option>
                    <option>Admin</option>
                  </select>
                  <span class="fieldIcon">▾</span>
                </div>
              </div>

              <div class="formFooter">
                <div class="miniInfo">
                  <span class="miniInfo__icon">📅</span>
                  <span>Date d’inscription</span>
                  <span class="miniInfo__value">07/04/2024</span>
                </div>

                <button class="btn btn--primary btn--wide">Enregistrer les modifications</button>
              </div>
            </div>
          </div>

        </section>
      </main>

    </div>
  </div>
</body>
</html>
