<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainUP - Chatbot</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <div class="appBg">
    <div class="shell">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand__logo">🧠</div>
          <div class="brand__name">Brain<span>UP</span></div>
        </div>

        <nav class="nav">
          <a class="nav__item" href="./accueil.html">🏠 <span>Accueil</span></a>
          <a class="nav__item" href="./cours.html">📚 <span>Cours</span></a>
          <a class="nav__item" href="./tableau_de_bord.html">📊 <span>Tableau de Bord</span></a>
          <a class="nav__item" href="./recommandations.html">⭐ <span>Recommandations</span></a>
          <a class="nav__item" href="./quiz.html">✅ <span>Quiz</span></a>
          <a class="nav__item is-active" href="./chatbot.html">💬 <span>Chatbot</span></a>
          <a class="nav__item" href="./profil.html">👤 <span>Profil</span></a>

          <div class="nav__divider"></div>

          <a class="nav__item" href="./deconnexion.html">⏻ <span>Déconnexion</span></a>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- TOPBAR -->
        <header class="topbar">
          <div class="search">
            <span class="search__icon">🔎</span>
            <input class="search__input" placeholder="Rechercher un message" />
          </div>

          <div class="topbar__right">
            <button class="iconBtn" title="Notifications">🔔</button>
            <button class="iconBtn" title="Messages">💬</button>
            <button class="iconBtn" title="Favoris">🔖</button>
          </div>
        </header>

        <!-- CONTENT -->
        <section class="content">

          <div class="chatWrap">
            <div class="chatCard">
              <div class="chatTitle">
                <div class="chatTitle__icon">🤖</div>
                <div>
                  <div class="chatTitle__h1">Chatbot</div>
                  <div class="chatTitle__p">Bienvenue ! Comment puis-je vous aider ?</div>
                </div>
              </div>

              <!-- bubble -->
              <div class="chatHello">
                <div class="chatHello__avatar"></div>
                <div class="chatHello__bubble">
                  Bonjour ! Comment puis-je vous aider ?
                </div>
              </div>

              <!-- actions -->
              <div class="chatActions">
                <button class="chatAction">
                  <span class="chatAction__ico">📘</span>
                  <span>Reprendre mon dernier cours</span>
                  <span class="chatAction__chev">›</span>
                </button>

                <button class="chatAction">
                  <span class="chatAction__ico">⭐</span>
                  <span>Mes recommandations de cours</span>
                  <span class="chatAction__chev">›</span>
                </button>

                <button class="chatAction">
                  <span class="chatAction__ico">✅</span>
                  <span>Parler-moi des quiz disponibles</span>
                  <span class="chatAction__chev">›</span>
                </button>
              </div>

              <!-- quick questions -->
              <div class="chatSection">
                <div class="chatSection__title">Comment puis-je vous aider ?</div>

                <div class="chatQuick">
                  <button class="chatQuick__item">
                    Se baser sur ton niveau et te proposer un plan ?
                    <span>›</span>
                  </button>
                  <button class="chatQuick__item">
                    Me faire un résumé du cours “Python” ?
                    <span>›</span>
                  </button>
                  <button class="chatQuick__item">
                    Me donner des exercices pour m’entraîner ?
                    <span>›</span>
                  </button>
                </div>
              </div>

              <!-- input bottom -->
              <div class="chatComposer">
                <button class="chatComposer__attach" title="Joindre">📎</button>
                <input class="chatComposer__input" placeholder="Écrire un message..." />
                <button class="chatComposer__send" title="Envoyer">➤</button>
              </div>
            </div>
          </div>

        </section>
      </main>

    </div>
  </div>
</body>
</html>
